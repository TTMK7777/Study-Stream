name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - run: npm run typecheck

      - run: npm run test

      - run: npm run build
        env:
          # build 時は env なしでも通る設計（Lazy Proxy / middleware の env 未設定素通し）
          NEXT_TELEMETRY_DISABLED: "1"
